version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: hexa-iq-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hexa-iq-test

  backend:
    build: ./backend
    container_name: hexa-iq-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/hexa-iq-test
      JWT_SECRET: hexa_iq_test_super_secret_key
      ADMIN_EMAIL: praphulla@hexamatics.com
      ADMIN_PASSWORD: Asim@1212
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: hexa-iq-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  default:
    name: hexa-iq-network
